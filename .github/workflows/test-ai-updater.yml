name: Test AI Updater Workflow
#For local testing run: act workflow_dispatch -s GOOGLE_API_KEY -s GITHUB_TOKEN --container-architecture linux/amd64

on:
  workflow_dispatch:

jobs:
  call-ai-updater:
    uses: gabegottlob/viam-ai-updater/.github/workflows/ai-updater.yml@main
    with:
        target_branch: test-ai-workflow
    secrets:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
